<link rel="stylesheet" href="modules/foundry-api-bridge/styles/config-form.css">

<form class="foundry-api-bridge-config-form">
  <!-- WebSocket Settings -->
  <div class="section">
    <h2>WebSocket</h2>

    <div class="form-grid">
      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" name="webSocket.enabled" {{#if config.webSocket.enabled}}checked{{/if}} />
          <span>Enable WebSocket</span>
        </label>
      </div>

      <div class="form-group">
        <label for="reconnectInterval">Reconnect Interval (ms)</label>
        <input type="number" name="webSocket.reconnectInterval" id="reconnectInterval" value="{{config.webSocket.reconnectInterval}}" min="1000" step="1000" />
      </div>

      <div class="form-group">
        <label for="maxReconnectAttempts">Max Reconnect Attempts</label>
        <input type="number" name="webSocket.maxReconnectAttempts" id="maxReconnectAttempts" value="{{config.webSocket.maxReconnectAttempts}}" min="1" step="1" />
      </div>
    </div>
  </div>

  <!-- Logging -->
  <div class="section">
    <h2>Logging</h2>

    <div class="form-grid">
      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" name="logging.enabled" {{#if config.logging.enabled}}checked{{/if}} />
          <span>Enable Logging</span>
        </label>
      </div>

      <div class="form-group">
        <label for="logLevel">Log Level</label>
        <select name="logging.level" id="logLevel">
          <option value="debug" {{#if (eq config.logging.level "debug")}}selected{{/if}}>Debug</option>
          <option value="info" {{#if (eq config.logging.level "info")}}selected{{/if}}>Info</option>
          <option value="warn" {{#if (eq config.logging.level "warn")}}selected{{/if}}>Warn</option>
          <option value="error" {{#if (eq config.logging.level "error")}}selected{{/if}}>Error</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Submit Button -->
  <button type="submit" name="submit">
    <i class="fas fa-save"></i> Save Configuration
  </button>
</form>
